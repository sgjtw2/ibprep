<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#09090f">
  <title>News Terminal — IB Prep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ──────────────────────────────────────────────── */
    :root {
      --bg:      #09090f;
      --bg2:     #0e1117;
      --bg3:     #141920;
      --bg4:     #1a2030;
      --border:  #1e2635;
      --border2: #252f3e;
      --text:    #dde3ed;
      --text2:   #99a8ba;
      --muted:   #4e5d70;
      --accent:  #f97316;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --font:    'Inter', system-ui, -apple-system, sans-serif;
      --mono:    'JetBrains Mono', 'Courier New', monospace;
    }

    /* ── RESET ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100%;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    /* ── TOPBAR ──────────────────────────────────────────────── */
    #topbar {
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      height: 50px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      animation: blink 2.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
    .logo-name {
      font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--accent);
    }
    .logo-sep { color: var(--border2); margin: 0 2px; font-size: 14px; }
    .logo-sub {
      font-size: 9px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted);
    }

    .tb-gap { flex: 1; }

    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 9px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); font-size: 13px;
      pointer-events: none; line-height: 1;
    }
    #searchBox {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 5px 10px 5px 28px;
      width: 200px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
    }
    #searchBox::placeholder { color: var(--muted); }
    #searchBox:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(249,115,22,.15); }

    #countdown {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      min-width: 36px;
      text-align: right;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 5px 11px; border-radius: 4px;
      white-space: nowrap; transition: all .15s;
      flex-shrink: 0;
    }
    .btn-refresh {
      color: var(--accent);
      border: 1px solid rgba(249,115,22,.35);
    }
    .btn-refresh:hover { background: rgba(249,115,22,.1); border-color: var(--accent); }
    .btn-refresh.spin svg { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-back {
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-back:hover { color: var(--text); border-color: var(--border2); }

    /* ── TICKER TAPE ─────────────────────────────────────────── */
    #tickerWrap {
      height: 34px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      cursor: default;
    }
    #tickerTrack {
      display: flex;
      align-items: center;
      white-space: nowrap;
      animation: scroll 90s linear infinite;
      will-change: transform;
    }
    #tickerWrap:hover #tickerTrack { animation-play-state: paused; }
    @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    .tk {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 18px;
      height: 34px;
      border-right: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
      flex-shrink: 0;
    }
    .tk-lbl  { font-size: 9px; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); }
    .tk-val  { font-weight: 500; color: var(--text2); }
    .tk-chg  { font-size: 10px; }
    .up  { color: var(--green); }
    .dn  { color: var(--red); }
    .fl  { color: var(--muted); }
    .tk-loading { padding: 0 20px; font-size: 10px; color: var(--muted); font-family: var(--mono); }

    /* ── TAB BAR ─────────────────────────────────────────────── */
    #tabBar {
      display: flex;
      align-items: flex-end;
      padding: 0 20px;
      background: var(--bg2);
      border-bottom: 2px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    #tabBar::-webkit-scrollbar { display: none; }

    .tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px 9px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: color .15s, border-color .15s;
      position: relative;
    }
    .tab:hover { color: var(--text2); }
    .tab.on { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-badge {
      font-size: 8px; font-weight: 700;
      padding: 1px 4px; border-radius: 2px;
      background: rgba(249,115,22,.15);
      color: var(--accent);
      letter-spacing: 0;
      display: none;
    }
    .tab.on .tab-badge { display: inline; }

    /* ── FILTER BAR ──────────────────────────────────────────── */
    #filterBar {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #filterBar::-webkit-scrollbar { display: none; }

    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 4px;
      border: 1px solid var(--border);
      font-size: 10px; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase;
      color: var(--muted); white-space: nowrap;
      flex-shrink: 0; transition: all .12s; cursor: pointer;
    }
    .chip:hover { border-color: var(--border2); color: var(--text2); }
    .chip.on { color: #fff; }
    .chip-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .chip-n { font-weight: 400; opacity: .5; margin-left: 1px; }

    /* ── MAIN ────────────────────────────────────────────────── */
    #main { max-width: 1040px; margin: 0 auto; }

    /* ── WARN BAR ────────────────────────────────────────────── */
    #warnBar {
      display: none;
      padding: 6px 20px;
      font-size: 10px;
      color: #fbbf24;
      background: rgba(251,191,36,.06);
      border-bottom: 1px solid rgba(251,191,36,.15);
    }

    /* ── DATE GROUP HEADER ───────────────────────────────────── */
    .date-hdr {
      padding: 8px 20px 5px;
      font-size: 9px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    /* ── ARTICLE ROW ─────────────────────────────────────────── */
    .article {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 20px;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
    }
    .article:hover { background: var(--bg2); }
    .article:active { background: var(--bg3); }

    .art-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 36px;
      padding-top: 2px;
    }
    .art-tag {
      font-size: 7.5px; font-weight: 800;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 2px 5px; border-radius: 2px;
      white-space: nowrap; flex-shrink: 0;
      color: #fff; margin-top: 2px;
    }
    .art-title {
      flex: 1;
      font-size: 13px; font-weight: 400;
      color: var(--text); line-height: 1.45;
    }
    .article:hover .art-title { color: #fff; }

    /* ── SKELETON ────────────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }
    .skel {
      background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: 3px;
    }
    .skel-row {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 20px; border-bottom: 1px solid var(--border);
    }

    /* ── EMPTY ───────────────────────────────────────────────── */
    #emptyState {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .empty-icon { font-size: 36px; opacity: .3; }

    /* ── STATUS BAR ──────────────────────────────────────────── */
    #statusBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 20px;
      font-size: 10px;
      color: var(--muted);
      font-family: var(--mono);
      background: var(--bg2);
      border-top: 1px solid var(--border);
      position: sticky;
      bottom: 0;
      z-index: 100;
    }

    /* ── RESPONSIVE — MOBILE ≤768 ────────────────────────────── */
    @media (max-width: 768px) {
      #topbar { padding: 0 14px; gap: 8px; height: 52px; }
      .logo-sub, .logo-sep { display: none; }
      .logo-name { font-size: 10px; }
      .logo-dot { width: 7px; height: 7px; }
      #searchBox { width: 120px; font-size: 16px; }
      .btn-back { display: none; }
      .btn { padding: 6px 10px; min-height: 34px; }
      #tabBar { padding: 0 14px; }
      .tab { padding: 9px 11px 8px; font-size: 10px; }
      #filterBar { padding: 7px 14px; gap: 5px; }
      .chip { padding: 6px 9px; min-height: 30px; }
      #main { max-width: 100%; }
      .article { padding: 11px 14px; gap: 9px; }
      .art-title { font-size: 13px; }
      .date-hdr { padding: 7px 14px 4px; }
      #statusBar { padding: 5px 14px; font-size: 9px; }
      #warnBar { padding: 6px 14px; }
      body { padding-bottom: env(safe-area-inset-bottom, 0); }
    }

    /* ── RESPONSIVE — TABLET 769–1100 ───────────────────────── */
    @media (min-width: 769px) and (max-width: 1100px) {
      #topbar { padding: 0 16px; }
      #searchBox { width: 160px; }
      #tabBar { padding: 0 16px; }
      #filterBar { padding: 7px 16px; }
      #main { max-width: 100%; }
      .article { padding: 11px 16px; }
      .date-hdr { padding: 8px 16px 5px; }
      #statusBar { padding: 5px 16px; }
    }

    /* ── COARSE POINTER ──────────────────────────────────────── */
    @media (pointer: coarse) {
      .article { padding: 13px 20px; }
      .chip { min-height: 34px; }
      .btn { min-height: 36px; }
      .tab { padding: 11px 14px 10px; min-height: 44px; }
      .tk { height: 36px; }
      #tickerWrap { height: 36px; }
    }
    @media (pointer: coarse) and (max-width: 768px) {
      .article { padding: 13px 14px; }
      .tab { padding: 11px 11px 10px; }
    }
  </style>
</head>
<body>

<!-- ── TOPBAR ─────────────────────────────────────────── -->
<div id="topbar">
  <div class="logo">
    <span class="logo-dot"></span>
    <span class="logo-name">IB Prep</span>
    <span class="logo-sep">·</span>
    <span class="logo-sub">News Terminal</span>
  </div>

  <div class="tb-gap"></div>

  <div class="search-wrap">
    <span class="search-icon">&#9906;</span>
    <input id="searchBox" type="search" placeholder="Search headlines…"
      oninput="onSearch()" autocomplete="off" spellcheck="false">
  </div>

  <span id="countdown"></span>

  <button class="btn btn-refresh" id="refreshBtn" onclick="manualRefresh()">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
    </svg>
    Refresh
  </button>

  <a href="./financial-model.html" class="btn btn-back">← App</a>
</div>

<!-- ── TICKER TAPE ─────────────────────────────────────── -->
<div id="tickerWrap" title="Hover to pause">
  <div id="tickerTrack">
    <span class="tk-loading">Loading market data…</span>
  </div>
</div>

<!-- ── TAB BAR ─────────────────────────────────────────── -->
<div id="tabBar">
  <button class="tab on" data-id="market"  onclick="switchTab('market')">Market News</button>
  <button class="tab"    data-id="pulse"   onclick="switchTab('pulse')">Market Pulse</button>
  <button class="tab"    data-id="stocks"  onclick="switchTab('stocks')">Stocks News</button>
  <button class="tab"    data-id="etf"     onclick="switchTab('etf')">ETF News</button>
  <button class="tab"    data-id="crypto"  onclick="switchTab('crypto')">Crypto News</button>
</div>

<!-- ── FILTER BAR ──────────────────────────────────────── -->
<div id="filterBar">
  <button class="chip on" data-id="all" onclick="setFilter('all')">All</button>
</div>

<!-- ── CONTENT ─────────────────────────────────────────── -->
<div id="main">
  <div id="warnBar"></div>
  <div id="skeletons"></div>
  <div id="feed"></div>
  <div id="emptyState">
    <span class="empty-icon">📡</span>
    <span>No articles match your filter.</span>
  </div>
</div>

<!-- ── STATUS BAR ──────────────────────────────────────── -->
<div id="statusBar">
  <span id="statusL">Loading…</span>
  <span id="statusR"></span>
</div>

<script>
'use strict';

/* ── CONFIG ──────────────────────────────────────────────── */
const PROXY = 'https://api.allorigins.win/get?url=';

const TABS = [
  {
    id: 'market',
    name: 'Market News',
    feeds: [
      { id:'finviz',    name:'FinViz',        tag:'FVZ',  clr:'#EF4444', url:'https://finviz.com/news.ashx',                          type:'html' },
      { id:'bloomberg', name:'Bloomberg',      tag:'BBG',  clr:'#FF8C00', url:'https://feeds.bloomberg.com/markets/news.rss',           type:'rss'  },
      { id:'reuters',   name:'Reuters',        tag:'RTRS', clr:'#FF5500', url:'https://feeds.reuters.com/reuters/businessNews',         type:'rss'  },
      { id:'wsj',       name:'WSJ',            tag:'WSJ',  clr:'#0060A8', url:'https://feeds.a.dj.com/rss/RSSMarketsMain.xml',          type:'rss'  },
      { id:'ft',        name:'Fin. Times',     tag:'FT',   clr:'#C5A028', url:'https://www.ft.com/rss/home',                           type:'rss'  },
      { id:'cnbc',      name:'CNBC',           tag:'CNBC', clr:'#0084CC', url:'https://www.cnbc.com/id/10000664/device/rss/rss.html',   type:'rss'  },
    ]
  },
  {
    id: 'pulse',
    name: 'Market Pulse',
    feeds: [
      { id:'finviz_p',  name:'FinViz Pulse',  tag:'FVZ',  clr:'#EF4444', url:'https://finviz.com/news.ashx?v=2',                      type:'html' },
      { id:'reuters_t', name:'Reuters',       tag:'RTRS', clr:'#FF5500', url:'https://feeds.reuters.com/reuters/topNews',              type:'rss'  },
      { id:'ap',        name:'AP Business',   tag:'AP',   clr:'#2563EB', url:'https://feeds.apnews.com/apf-business',                  type:'rss'  },
      { id:'investing', name:'Investing.com', tag:'INV',  clr:'#C0392B', url:'https://www.investing.com/rss/news.rss',                 type:'rss'  },
      { id:'cnbc_top',  name:'CNBC',          tag:'CNBC', clr:'#0084CC', url:'https://www.cnbc.com/id/100727362/device/rss/rss.html',  type:'rss'  },
    ]
  },
  {
    id: 'stocks',
    name: 'Stocks News',
    feeds: [
      { id:'finviz_s',  name:'FinViz Stocks', tag:'FVZ',  clr:'#EF4444', url:'https://finviz.com/news.ashx?v=3',                      type:'html' },
      { id:'yahoo_s',   name:'Yahoo Finance', tag:'YFN',  clr:'#8B5CF6', url:'https://finance.yahoo.com/news/rssindex',               type:'rss'  },
      { id:'wsj_s',     name:'WSJ',           tag:'WSJ',  clr:'#0060A8', url:'https://feeds.a.dj.com/rss/RSSMarketsMain.xml',          type:'rss'  },
      { id:'cnbc_s',    name:'CNBC',          tag:'CNBC', clr:'#0084CC', url:'https://www.cnbc.com/id/15839069/device/rss/rss.html',   type:'rss'  },
      { id:'reuters_s', name:'Reuters',       tag:'RTRS', clr:'#FF5500', url:'https://feeds.reuters.com/reuters/businessNews',         type:'rss'  },
    ]
  },
  {
    id: 'etf',
    name: 'ETF News',
    feeds: [
      { id:'finviz_e',  name:'FinViz ETF',    tag:'FVZ',  clr:'#EF4444', url:'https://finviz.com/news.ashx?v=4',                      type:'html' },
      { id:'etfdb',     name:'ETF Database',  tag:'ETFD', clr:'#10B981', url:'https://etfdb.com/feed/',                               type:'rss'  },
      { id:'etftrends', name:'ETF Trends',    tag:'ETFT', clr:'#059669', url:'https://www.etftrends.com/feed/',                       type:'rss'  },
      { id:'yahoo_e',   name:'Yahoo Finance', tag:'YFN',  clr:'#8B5CF6', url:'https://finance.yahoo.com/news/rssindex',               type:'rss'  },
    ]
  },
  {
    id: 'crypto',
    name: 'Crypto News',
    feeds: [
      { id:'finviz_c',  name:'FinViz Crypto', tag:'FVZ',  clr:'#EF4444', url:'https://finviz.com/news.ashx?v=5',                      type:'html' },
      { id:'coindesk',  name:'CoinDesk',      tag:'CD',   clr:'#F7931A', url:'https://www.coindesk.com/arc/outboundfeeds/rss/',       type:'rss'  },
      { id:'cointele',  name:'CoinTelegraph', tag:'CT',   clr:'#17A589', url:'https://cointelegraph.com/rss',                         type:'rss'  },
      { id:'decrypt',   name:'Decrypt',       tag:'DCR',  clr:'#9333EA', url:'https://decrypt.co/feed',                              type:'rss'  },
    ]
  },
];

const TICKER_SYMS = [
  ['SPY',       'S&P 500'],
  ['QQQ',       'NASDAQ'],
  ['^DJI',      'DOW'],
  ['^VIX',      'VIX'],
  ['GC=F',      'GOLD'],
  ['CL=F',      'OIL WTI'],
  ['EURUSD=X',  'EUR/USD'],
  ['BTC-USD',   'BTC'],
  ['^TNX',      'US 10YR'],
  ['DX-Y.NYB',  'USD IDX'],
];

const REFRESH_MS = 5 * 60 * 1000;

/* ── STATE ───────────────────────────────────────────────── */
let activeTabId = 'market';
let allItems    = [];
let activeSrc   = 'all';
let query       = '';
let failed      = [];
let tabCache    = {};
let cntId       = null;
let cntSec      = 0;

function activeTab() { return TABS.find(t => t.id === activeTabId); }

/* ── FETCH: RSS ──────────────────────────────────────────── */
async function fetchRSSFeed(feed) {
  try {
    const res  = await fetch(PROXY + encodeURIComponent(feed.url), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!json.contents) throw new Error('empty response');

    const xml = new DOMParser().parseFromString(json.contents, 'text/xml');
    if (xml.querySelector('parsererror')) throw new Error('XML parse error');

    return [...xml.querySelectorAll('item')].slice(0, 30).map(el => {
      const raw   = el.querySelector('title')?.textContent || '';
      const title = raw.replace(/<!\[CDATA\[|\]\]>/g, '').trim();
      const link  = (el.querySelector('link')?.textContent?.trim()
                  || el.querySelector('guid')?.textContent?.trim() || '').trim();
      const rawDate = el.querySelector('pubDate')?.textContent?.trim()
                    || el.querySelector('dc\\:date,date')?.textContent?.trim() || '';
      const date = rawDate ? new Date(rawDate) : new Date();
      return { title, link, date, feed, key: link || title };
    }).filter(i => i.title.length > 6 && !i.title.startsWith('<?'));
  } catch (e) {
    console.warn('[rss]', feed.name, '—', e.message);
    failed.push(feed.name);
    return [];
  }
}

/* ── FETCH: FinViz HTML ──────────────────────────────────── */
async function fetchHTMLFeed(feed) {
  try {
    const res  = await fetch(PROXY + encodeURIComponent(feed.url), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!json.contents) throw new Error('empty');

    const doc  = new DOMParser().parseFromString(json.contents, 'text/html');
    const rows = [...doc.querySelectorAll('.news-table tr')];
    if (!rows.length) throw new Error('no news-table rows');

    const MONTH = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    let curDate = new Date();

    return rows.map(row => {
      const cells = row.querySelectorAll('td');
      if (cells.length < 2) return null;

      const dateText = cells[0].textContent.trim();
      const newsCell = cells[cells.length - 1];
      const anchor   = newsCell.querySelector('a');
      if (!anchor) return null;

      const title = anchor.textContent.trim();
      const href  = anchor.getAttribute('href') || '';

      // Parse FinViz date: "Apr-25-26" or "08:30AM"
      if (dateText) {
        const timeM = dateText.match(/^(\d{1,2}):(\d{2})(AM|PM)$/i);
        const dateM = dateText.match(/^([A-Za-z]{3})-(\d{1,2})-(\d{2})$/);
        if (timeM) {
          let h = parseInt(timeM[1]);
          const m = parseInt(timeM[2]);
          const p = timeM[3].toUpperCase();
          if (p === 'PM' && h !== 12) h += 12;
          if (p === 'AM' && h === 12) h = 0;
          const d = new Date(curDate);
          d.setHours(h, m, 0, 0);
          curDate = d;
        } else if (dateM) {
          const mo = MONTH[dateM[1]];
          if (mo !== undefined) {
            curDate = new Date(2000 + parseInt(dateM[3]), mo, parseInt(dateM[2]));
          }
        }
      }

      return title.length > 6
        ? { title, link: href, date: new Date(curDate), feed, key: href || title }
        : null;
    }).filter(Boolean);
  } catch (e) {
    console.warn('[html]', feed.name, '—', e.message);
    failed.push(feed.name);
    return [];
  }
}

/* ── FETCH: dispatch ─────────────────────────────────────── */
function fetchFeed(feed) {
  return feed.type === 'html' ? fetchHTMLFeed(feed) : fetchRSSFeed(feed);
}

/* ── LOAD TAB ────────────────────────────────────────────── */
async function loadTab(tabId, force) {
  const tab    = TABS.find(t => t.id === tabId);
  if (!tab) return;

  // Use cache if fresh and not forced
  const cached = tabCache[tabId];
  if (!force && cached && Date.now() - cached.at < REFRESH_MS) {
    allItems = cached.items;
    failed   = cached.failed;
    buildFilterBar();
    renderFeed();
    renderWarn();
    setStatus(getFiltered().length);
    return;
  }

  failed = [];
  showSkeleton();

  const results = await Promise.allSettled(tab.feeds.map(fetchFeed));
  const raw     = results.flatMap(r => r.status === 'fulfilled' ? r.value : []);

  const seen = new Set();
  allItems = raw.filter(i => {
    if (seen.has(i.key)) return false;
    seen.add(i.key);
    return true;
  }).sort((a, b) => b.date - a.date);

  tabCache[tabId] = { items: allItems, failed: [...failed], at: Date.now() };

  hideSkeleton();
  buildFilterBar();
  renderFeed();
  renderWarn();
  setStatus(getFiltered().length);
}

/* ── SWITCH TAB ──────────────────────────────────────────── */
function switchTab(tabId) {
  if (activeTabId === tabId) return;
  activeTabId = tabId;
  activeSrc   = 'all';
  query       = '';
  document.getElementById('searchBox').value = '';

  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('on', t.dataset.id === tabId)
  );

  loadTab(tabId);
}

/* ── FETCH: TICKER ───────────────────────────────────────── */
async function loadTicker() {
  try {
    const syms = TICKER_SYMS.map(([s]) => s).join(',');
    const api  = 'https://query1.finance.yahoo.com/v7/finance/quote?symbols='
               + encodeURIComponent(syms);
    const res  = await fetch(PROXY + encodeURIComponent(api));
    const json = await res.json();
    const data = JSON.parse(json.contents);
    buildTicker(data?.quoteResponse?.result || []);
  } catch (e) {
    console.warn('[ticker]', e.message);
    document.getElementById('tickerTrack').innerHTML =
      '<span class="tk-loading">Market data unavailable</span>';
  }
}

function buildTicker(quotes) {
  const map  = Object.fromEntries(TICKER_SYMS);
  const html = quotes.map(q => {
    const lbl   = map[q.symbol] || q.symbol;
    const price = q.regularMarketPrice;
    const pct   = q.regularMarketChangePercent;
    const disp  = price == null ? '—'
      : price < 10   ? price.toFixed(4)
      : price < 1000 ? price.toFixed(2)
      : price.toLocaleString('en-US', { maximumFractionDigits: 0 });
    const arrow  = pct >  0.01 ? '▲' : pct < -0.01 ? '▼' : '─';
    const cls    = pct >  0.01 ? 'up' : pct < -0.01 ? 'dn' : 'fl';
    const pctStr = pct != null ? (pct > 0 ? '+' : '') + pct.toFixed(2) + '%' : '';
    return `<span class="tk">
      <span class="tk-lbl">${lbl}</span>
      <span class="tk-val">${disp}</span>
      <span class="tk-chg ${cls}">${arrow} ${pctStr}</span>
    </span>`;
  }).join('');

  const track = document.getElementById('tickerTrack');
  track.innerHTML = html + html;
  requestAnimationFrame(() => {
    const dur = Math.max(20, track.scrollWidth / 2 / 85);
    track.style.animationDuration = dur + 's';
  });
}

/* ── RENDER: FEED ────────────────────────────────────────── */
function getFiltered() {
  const q = query.trim().toLowerCase();
  return allItems.filter(i => {
    if (activeSrc !== 'all' && i.feed.id !== activeSrc) return false;
    if (q && !i.title.toLowerCase().includes(q)
          && !i.feed.name.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderFeed() {
  const items = getFiltered();
  const feed  = document.getElementById('feed');
  const empty = document.getElementById('emptyState');

  if (!items.length) {
    feed.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  let html = '', lastKey = '';
  items.forEach(item => {
    const key = dateKey(item.date);
    if (key !== lastKey) {
      html   += `<div class="date-hdr">${key}</div>`;
      lastKey = key;
    }
    html += `<a class="article" href="${safeAttr(item.link)}" target="_blank" rel="noopener noreferrer">
      <span class="art-time">${ago(item.date)}</span>
      <span class="art-tag" style="background:${item.feed.clr}">${item.feed.tag}</span>
      <span class="art-title">${safeHtml(item.title)}</span>
    </a>`;
  });

  feed.innerHTML = html;
  setStatus(items.length);
}

/* ── RENDER: FILTER BAR ──────────────────────────────────── */
function buildFilterBar() {
  const bar  = document.getElementById('filterBar');
  const tab  = activeTab();
  const cnt  = {};
  allItems.forEach(i => { cnt[i.feed.id] = (cnt[i.feed.id] || 0) + 1; });

  const allOn = activeSrc === 'all';
  let html = `<button class="chip ${allOn ? 'on' : ''}" onclick="setFilter('all')"
    style="${allOn ? 'background:#1c2d45;border-color:#2563eb;color:#e2e8f0' : ''}">
    All <span class="chip-n">${allItems.length}</span>
  </button>`;

  (tab?.feeds || []).forEach(f => {
    const n  = cnt[f.id] || 0;
    if (!n) return;
    const on = activeSrc === f.id;
    html += `<button class="chip ${on ? 'on' : ''}" onclick="setFilter('${f.id}')"
      style="${on ? `background:${hexAlpha(f.clr,0.15)};border-color:${f.clr};color:#fff` : ''}">
      <span class="chip-dot" style="background:${f.clr}"></span>
      ${f.name} <span class="chip-n">${n}</span>
    </button>`;
  });

  bar.innerHTML = html;
}

/* ── RENDER: WARN ────────────────────────────────────────── */
function renderWarn() {
  const el = document.getElementById('warnBar');
  if (!failed.length) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.textContent   = '⚠  Could not reach: ' + failed.join(', ')
                   + '. Remaining sources loaded successfully.';
}

/* ── CONTROLS ────────────────────────────────────────────── */
function setFilter(src) {
  activeSrc = src;
  buildFilterBar();
  renderFeed();
}

function onSearch() {
  query = document.getElementById('searchBox').value;
  renderFeed();
}

function manualRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  clearInterval(cntId);
  delete tabCache[activeTabId];
  Promise.all([loadTab(activeTabId, true), loadTicker()]).then(() => {
    btn.classList.remove('spin');
    startCountdown();
  });
}

/* ── SKELETON ────────────────────────────────────────────── */
function showSkeleton() {
  const w = [60, 40, 180, 220, 160, 200, 140, 190, 170, 210];
  document.getElementById('skeletons').innerHTML = w.map(pw =>
    `<div class="skel-row">
      <div class="skel" style="width:34px;height:11px;flex-shrink:0"></div>
      <div class="skel" style="width:28px;height:15px;flex-shrink:0;border-radius:2px"></div>
      <div class="skel" style="width:${pw}px;max-width:100%;height:13px"></div>
    </div>`
  ).join('');
  document.getElementById('feed').innerHTML = '';
  document.getElementById('emptyState').style.display = 'none';
}
function hideSkeleton() {
  document.getElementById('skeletons').innerHTML = '';
}

/* ── STATUS ──────────────────────────────────────────────── */
function setStatus(n) {
  document.getElementById('statusL').textContent =
    n.toLocaleString() + ' article' + (n !== 1 ? 's' : '');
  document.getElementById('statusR').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}

/* ── COUNTDOWN ───────────────────────────────────────────── */
function startCountdown() {
  clearInterval(cntId);
  cntSec = REFRESH_MS / 1000;
  cntId  = setInterval(() => {
    cntSec--;
    if (cntSec <= 0) {
      clearInterval(cntId);
      delete tabCache[activeTabId];
      loadTab(activeTabId, true);
      loadTicker();
      startCountdown();
      return;
    }
    const m = Math.floor(cntSec / 60).toString().padStart(2, '0');
    const s = (cntSec % 60).toString().padStart(2, '0');
    document.getElementById('countdown').textContent = m + ':' + s;
  }, 1000);
}

/* ── UTILS ───────────────────────────────────────────────── */
function ago(d) {
  const ms = Date.now() - d.getTime();
  const m  = Math.floor(ms / 60000);
  if (m < 1)  return 'now';
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function dateKey(d) {
  const now  = new Date();
  const date = new Date(d);
  if (date.toDateString() === now.toDateString()) return 'TODAY';
  const yest = new Date(now);
  yest.setDate(yest.getDate() - 1);
  if (date.toDateString() === yest.toDateString()) return 'YESTERDAY';
  return date.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function safeHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function safeAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── INIT ────────────────────────────────────────────────── */
loadTab('market');
loadTicker();
startCountdown();
</script>
